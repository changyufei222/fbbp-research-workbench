version: 1
queue_backend: postgres
queue_root: runs/control_plane/a2a_queue
max_attempts: 5
backoff_seconds: 30
lease_seconds: 900
streaming:
  enabled: true
  max_events: 500
  heartbeat_seconds: 15
push_notifications:
  enabled: true
  timeout_seconds: 5
  allowed_url_prefixes:
    - https://
auth:
  enabled: true
  allow_public_agent_card: true
  api_key_env: FBBP_A2A_API_KEY
  header_names:
    - Authorization
    - X-A2A-API-Key
    - X-FBBP-A2A-API-Key
  oidc:
    enabled: true
    issuer: https://issuer.example.com
    audience: fbbp-a2a-gateway
    required_scopes:
      - a2a:submit
    required_groups:
      - fbbp-agent-users
    trust_proxy_headers: true
    user_header: X-Forwarded-User
    groups_header: X-Forwarded-Groups
    verify_signature: false
redis:
  url_env: FBBP_A2A_REDIS_URL
  key_prefix: fbbp:a2a
postgres:
  dsn_env: FBBP_A2A_POSTGRES_DSN
  table_name: fbbp_a2a_tasks
  connect_timeout_seconds: 5
retryable_errors:
  - timeout
  - rate limit
  - connection
  - temporarily unavailable
dead_letter_root: runs/control_plane/dead_letters
