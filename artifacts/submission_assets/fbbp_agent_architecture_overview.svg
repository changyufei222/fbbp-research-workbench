<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .subtitle { font: 400 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .section { font: 700 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .label { font: 600 17px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .body { font: 400 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #334155; }
      .small { font: 400 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .metricN { font: 700 28px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #0f172a; }
      .metricL { font: 500 15px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #475569; }
      .card { stroke: #dbe4f0; stroke-width: 2; rx: 22; ry: 22; }
      .line { stroke: #94a3b8; stroke-width: 3; fill: none; stroke-linecap: round; }
      .arrow { fill: #94a3b8; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff1f2"/>
      <stop offset="100%" stop-color="#ffe4e6"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="url(#bg)"/>
  <rect x="36" y="28" width="1528" height="150" rx="28" ry="28" fill="url(#hero)" stroke="#bfdbfe" stroke-width="2"/>

  <text x="72" y="82" class="title">FBBP Agent Control Plane 项目架构总览</text>
  <text x="72" y="116" class="subtitle">将 Private RAG、MCP 工具、Agent 编排、Benchmark 评测与 MiniMind Query Compiler 串成同一条 AI 工作流</text>
  <text x="72" y="150" class="small">适用于申报材料展示：强调真实工作流、长链执行、多模块协作与可验证成果</text>

  <rect x="1120" y="54" width="120" height="92" rx="18" ry="18" fill="#ffffff" stroke="#dbe4f0" stroke-width="2"/>
  <text x="1180" y="92" text-anchor="middle" class="metricN">6/6</text>
  <text x="1180" y="120" text-anchor="middle" class="metricL">readiness checks</text>

  <rect x="1260" y="54" width="120" height="92" rx="18" ry="18" fill="#ffffff" stroke="#dbe4f0" stroke-width="2"/>
  <text x="1320" y="92" text-anchor="middle" class="metricN">50+</text>
  <text x="1320" y="120" text-anchor="middle" class="metricL">run records</text>

  <rect x="1400" y="54" width="120" height="92" rx="18" ry="18" fill="#ffffff" stroke="#dbe4f0" stroke-width="2"/>
  <text x="1460" y="92" text-anchor="middle" class="metricN">5</text>
  <text x="1460" y="120" text-anchor="middle" class="metricL">core modules</text>

  <text x="68" y="222" class="section">1. 用户入口与控制层</text>

  <rect x="70" y="248" width="260" height="130" class="card" fill="#ffffff"/>
  <text x="96" y="288" class="label">User / Research Request</text>
  <text x="96" y="320" class="body">自然语言研究问题、数据库检索、</text>
  <text x="96" y="344" class="body">formal case、批量评测请求</text>

  <rect x="388" y="230" width="396" height="166" class="card" fill="url(#blue)"/>
  <text x="416" y="272" class="label">FBBP Agent Control Plane</text>
  <text x="416" y="304" class="body">统一入口、任务路由、运行编排、结果汇总</text>
  <text x="416" y="332" class="body">支持长链工作流与多模块协作，而非单轮问答</text>
  <text x="416" y="364" class="small">核心路由：private_rag / public_lookup / formal_case / batch_eval / report_generation</text>

  <line x1="330" y1="313" x2="388" y2="313" class="line"/>
  <polygon points="388,313 374,305 374,321" class="arrow"/>

  <rect x="826" y="230" width="296" height="78" class="card" fill="#ffffff"/>
  <text x="850" y="270" class="label">Session Memory</text>
  <text x="850" y="296" class="body">read / write / compact / resume</text>

  <rect x="826" y="318" width="296" height="78" class="card" fill="#ffffff"/>
  <text x="850" y="358" class="label">A2A-style Worker Queue</text>
  <text x="850" y="384" class="body">gateway / queue / retry / dead-letter / trace</text>

  <line x1="784" y1="274" x2="826" y2="274" class="line"/>
  <polygon points="826,274 812,266 812,282" class="arrow"/>
  <line x1="784" y1="356" x2="826" y2="356" class="line"/>
  <polygon points="826,356 812,348 812,364" class="arrow"/>

  <text x="68" y="462" class="section">2. 五个核心能力模块</text>

  <rect x="70" y="492" width="280" height="172" class="card" fill="url(#green)"/>
  <text x="96" y="532" class="label">Private RAG Backend</text>
  <text x="96" y="562" class="body">仓库：llm-rag-knowledge-base</text>
  <text x="96" y="588" class="body">混合检索、证据回溯、grounded answer、</text>
  <text x="96" y="612" class="body">quality gates、结构化+文档双路召回</text>
  <text x="96" y="640" class="small">关键结果：answer keyword hit rate = 1.0</text>

  <rect x="380" y="492" width="280" height="172" class="card" fill="url(#amber)"/>
  <text x="406" y="532" class="label">MCP Tool Plane</text>
  <text x="406" y="562" class="body">仓库：fbtp-mcp-rag-server</text>
  <text x="406" y="588" class="body">search_knowledge、PubMed、</text>
  <text x="406" y="612" class="body">UniProt、PDB 等工具化接口</text>
  <text x="406" y="640" class="small">让 Agent 能调用私有知识与公开科学资源</text>

  <rect x="690" y="492" width="280" height="172" class="card" fill="url(#violet)"/>
  <text x="716" y="532" class="label">Formal / Batch Execution</text>
  <text x="716" y="562" class="body">formal case、batch runner、</text>
  <text x="716" y="588" class="body">可复现实验输出与 atlas package</text>
  <text x="716" y="616" class="body">2/2 frozen formal cases full success</text>
  <text x="716" y="644" class="small">33 evidence rows captured in frozen batch</text>

  <rect x="1000" y="492" width="250" height="172" class="card" fill="url(#rose)"/>
  <text x="1026" y="532" class="label">Benchmark / Eval</text>
  <text x="1026" y="562" class="body">仓库：llm-eval-benchmark</text>
  <text x="1026" y="588" class="body">RAG vs Direct、RAGAS-style</text>
  <text x="1026" y="612" class="body">summary、leaderboard、可视化结果</text>
  <text x="1026" y="640" class="small">RAG answer relevancy 0.8455 vs 0.7527</text>

  <rect x="1280" y="492" width="250" height="172" class="card" fill="url(#blue)"/>
  <text x="1306" y="532" class="label">MiniMind Query Compiler</text>
  <text x="1306" y="562" class="body">仓库：minimind-fbtp-lab</text>
  <text x="1306" y="588" class="body">自然语言需求 → 结构化查询计划</text>
  <text x="1306" y="612" class="body">validator-backed execution</text>
  <text x="1306" y="640" class="small">支撑复杂检索请求的自动编译能力</text>

  <line x1="586" y1="396" x2="586" y2="470" class="line"/>
  <polygon points="586,470 578,456 594,456" class="arrow"/>

  <text x="68" y="732" class="section">3. 长链 AI 工作流</text>

  <rect x="72" y="758" width="1456" height="150" class="card" fill="#ffffff"/>

  <rect x="100" y="792" width="168" height="82" rx="18" ry="18" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
  <text x="184" y="826" text-anchor="middle" class="label">问题理解</text>
  <text x="184" y="850" text-anchor="middle" class="small">intent routing</text>

  <rect x="306" y="792" width="168" height="82" rx="18" ry="18" fill="#ecfdf5" stroke="#bbf7d0" stroke-width="2"/>
  <text x="390" y="826" text-anchor="middle" class="label">检索与证据获取</text>
  <text x="390" y="850" text-anchor="middle" class="small">private RAG + MCP</text>

  <rect x="512" y="792" width="168" height="82" rx="18" ry="18" fill="#fffbeb" stroke="#fde68a" stroke-width="2"/>
  <text x="596" y="826" text-anchor="middle" class="label">证据过滤</text>
  <text x="596" y="850" text-anchor="middle" class="small">quality gate / rerank</text>

  <rect x="718" y="792" width="168" height="82" rx="18" ry="18" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="2"/>
  <text x="802" y="826" text-anchor="middle" class="label">查询编译</text>
  <text x="802" y="850" text-anchor="middle" class="small">MiniMind / DSL / validator</text>

  <rect x="924" y="792" width="168" height="82" rx="18" ry="18" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
  <text x="1008" y="826" text-anchor="middle" class="label">工具执行</text>
  <text x="1008" y="850" text-anchor="middle" class="small">formal case / batch / lookup</text>

  <rect x="1130" y="792" width="168" height="82" rx="18" ry="18" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2"/>
  <text x="1214" y="826" text-anchor="middle" class="label">结果汇总</text>
  <text x="1214" y="850" text-anchor="middle" class="small">report + artifacts + memory</text>

  <rect x="1336" y="792" width="168" height="82" rx="18" ry="18" fill="#ecfeff" stroke="#a5f3fc" stroke-width="2"/>
  <text x="1420" y="826" text-anchor="middle" class="label">评测与观测</text>
  <text x="1420" y="850" text-anchor="middle" class="small">dashboard / run records</text>

  <line x1="268" y1="833" x2="306" y2="833" class="line"/>
  <polygon points="306,833 292,825 292,841" class="arrow"/>
  <line x1="474" y1="833" x2="512" y2="833" class="line"/>
  <polygon points="512,833 498,825 498,841" class="arrow"/>
  <line x1="680" y1="833" x2="718" y2="833" class="line"/>
  <polygon points="718,833 704,825 704,841" class="arrow"/>
  <line x1="886" y1="833" x2="924" y2="833" class="line"/>
  <polygon points="924,833 910,825 910,841" class="arrow"/>
  <line x1="1092" y1="833" x2="1130" y2="833" class="line"/>
  <polygon points="1130,833 1116,825 1116,841" class="arrow"/>
  <line x1="1298" y1="833" x2="1336" y2="833" class="line"/>
  <polygon points="1336,833 1322,825 1322,841" class="arrow"/>

  <text x="72" y="944" class="small">图示重点：这不是单一聊天机器人，而是一套可执行、可验证、可评测、可复现的 Agent 驱动研究系统。</text>
</svg>
